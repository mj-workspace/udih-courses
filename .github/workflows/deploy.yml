name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: udih-2024-27/cybersecurity-course/lecturer-guide/package-lock.json

      - name: Build cybersecurity lecturer-guide
        working-directory: udih-2024-27/cybersecurity-course/lecturer-guide
        run: |
          npm install
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r udih-2024-27/cybersecurity-course/lecturer-guide/dist _site/cybersecurity

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
