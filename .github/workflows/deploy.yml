name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            homepage/pnpm-lock.yaml
            udih-2024-27/cybersecurity-course/lecturer-guide/pnpm-lock.yaml
            udih-2024-27/cybersecurity-course/presentation/pnpm-lock.yaml

      - name: Build homepage
        working-directory: homepage
        env:
          STATICRYPT_PASSWORD: ${{ secrets.HOMEPAGE_PASSWORD }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:encrypt

      - name: Build cybersecurity lecturer-guide
        working-directory: udih-2024-27/cybersecurity-course/lecturer-guide
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build cybersecurity presentation
        working-directory: udih-2024-27/cybersecurity-course/presentation
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r homepage/dist/* _site/
          cp -r udih-2024-27/cybersecurity-course/lecturer-guide/dist _site/cybersecurity-lecturer-guide
          cp -r udih-2024-27/cybersecurity-course/presentation/dist _site/cybersecurity-presentation
          cp -r cyber-demo _site/cyber-demo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
